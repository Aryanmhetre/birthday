<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Akshay! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --gold: #f5c842;
  --rose: #f06080;
  --cream: #fdf6e3;
  --soft: #c9b8e8;
  --card-gradient: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: default;
  color: var(--cream);
}

/* ── Confetti canvas ── */
#confetti-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
}

/* ── Stars bg ── */
.stars {
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 20% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,.5) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── CARD ── */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1500px;
  /* Added padding to prevent corner clipping on tilt */
  padding: 60px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: min(420px, 92vw);
  background: var(--card-gradient);
  border: 1px solid rgba(245,200,66,.25);
  border-radius: 32px;
  padding: 48px 40px 40px;
  text-align: center;
  box-shadow:
    0 0 60px rgba(245,200,66,.05),
    0 30px 80px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.06);
  transform-style: preserve-3d;
  opacity: 0;
  transform: translateY(40px) scale(.95);
  animation: cardReveal 1.2s cubic-bezier(.22,1,.36,1) .3s forwards;
  transition: transform 0.1s ease-out;
  /* Ensure overflow doesn't clip the glow */
  position: relative;
}

@keyframes cardReveal {
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* Glass Inner Shine */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 32px;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.cake {
  font-size: 80px;
  display: block;
  margin-bottom: 20px;
  animation: cakeBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(245,200,66,.4));
  transform: translateZ(60px);
}

@keyframes cakeBounce {
  0%,100% { transform: translateZ(60px) translateY(0) rotate(-3deg); }
  50%      { transform: translateZ(60px) translateY(-15px) rotate(3deg); }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 8vw, 48px);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 8px;
  transform: translateZ(40px);
  text-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

h1 span {
  font-style: italic;
  color: var(--gold);
  display: block;
}

/* ── Static Name Box ── */
.name-tag {
  margin: 24px auto;
  padding: 12px 24px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(245,200,66,.4);
  border-radius: 16px;
  display: inline-block;
  transform: translateZ(30px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.name-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 1px;
  display: block;
  text-shadow: 0 0 15px rgba(245,200,66,0.3);
}

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 0 0 24px;
  opacity: 0.6;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.message {
  font-size: 16px;
  color: rgba(253,246,227,.75);
  line-height: 1.8;
  margin-bottom: 32px;
  transform: translateZ(20px);
}

.message strong { color: var(--rose); font-weight: 400; font-style: italic; }

.balloons {
  display: flex; justify-content: center; gap: 12px;
  margin-bottom: 32px;
}

.balloon {
  font-size: 32px;
  animation: floatBalloon 3s ease-in-out infinite;
  cursor: pointer;
  transition: transform .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: inline-block;
}

.balloon:hover { transform: scale(1.4) !important; }

@keyframes floatBalloon {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-15px) rotate(5deg); }
}

.btn {
  background: linear-gradient(135deg, var(--gold) 0%, #e8a020 100%);
  color: #1a1200;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 16px 40px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(245,200,66,.3);
  transition: all 0.3s ease;
  transform: translateZ(50px);
}

.btn:hover {
  transform: translateZ(55px) translateY(-2px) scale(1.05);
  box-shadow: 0 12px 40px rgba(245,200,66,.45);
}

.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 18px;
  animation: sparkleFade 1s ease-out forwards;
  z-index: 100;
}

@keyframes sparkleFade {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

.ring {
  position: absolute;
  border: 2px solid var(--gold);
  border-radius: 50%;
  width: 60px; height: 60px;
  pointer-events: none;
  animation: ring .6s ease-out forwards;
}

@keyframes ring {
  0%   { transform: scale(.2); opacity: .8; }
  100% { transform: scale(2.5); opacity: 0; }
}

.footer {
  margin-top: 24px;
  font-size: 11px;
  color: rgba(253,246,227,.3);
  letter-spacing: .05em;
  text-transform: uppercase;
  transform: translateZ(10px);
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="stars"></div>

<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <span class="cake">🎂</span>
    <h1 id="bdayHeading">Happy <span>Birthday!</span></h1>

    <!-- Static Name tag replaces the input field -->
    <div class="name-tag">
      <span class="name-text">Akshay</span>
    </div>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <p class="message" id="msgText">
      May your day be wrapped in <strong>joy</strong>,<br>
      filled with laughter, love &amp; the kind of<br>
      magic that only <strong>birthdays</strong> bring. 🥂
    </p>

    <div class="balloons">
      <span class="balloon">🎈</span>
      <span class="balloon">🎉</span>
      <span class="balloon">🌟</span>
      <span class="balloon">🎊</span>
      <span class="balloon">🎈</span>
    </div>

    <button class="btn" id="celebrateBtn">🎆 Celebrate!</button>
    <p class="footer">Move mouse to tilt · Pop the balloons</p>
  </div>
</div>

<script>
const card = document.getElementById('card');

// ── 3D Tilt Effect ──
document.addEventListener('mousemove', (e) => {
  const x = e.clientX;
  const y = e.clientY;
  
  const rect = card.getBoundingClientRect();
  const px = ((x - rect.left) / rect.width) * 100;
  const py = ((y - rect.top) / rect.height) * 100;
  card.style.setProperty('--mx', `${px}%`);
  card.style.setProperty('--my', `${py}%`);

  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const rotateX = (centerY - y) / 30;
  const rotateY = (x - centerX) / 30;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

document.addEventListener('mouseleave', () => {
  card.style.transform = `rotateX(0deg) rotateY(0deg)`;
});

// ── Sparkles ──
const SPARKLES = ['✨','⭐','💫','🌟','✦','❋'];
document.addEventListener('mousemove', e => {
  if (Math.random() > .94) spawnSparkle(e.clientX, e.clientY);
});

function spawnSparkle(x, y) {
  const el = document.createElement('span');
  el.className = 'sparkle';
  el.textContent = SPARKLES[Math.floor(Math.random()*SPARKLES.length)];
  const tx = (Math.random()-0.5)*100 + 'px';
  const ty = (Math.random()-1)*100 + 'px';
  el.style.cssText = `left:${x}px;top:${y}px;--tx:${tx};--ty:${ty}`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── Confetti Engine ──
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animating = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const COLORS = ['#f5c842','#f06080','#c9b8e8','#6ee7b7','#fb923c','#38bdf8','#f9a8d4'];

function createParticle(x, y) {
  return {
    x, y,
    vx: (Math.random()-0.5)*15,
    vy: -(Math.random()*12+5),
    r: Math.random()*6+4,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    rot: Math.random()*360,
    rotV: (Math.random()-0.5)*10,
    gravity: 0.4,
    shape: Math.random() > 0.4 ? 'rect' : 'circle',
    life: 1,
    decay: Math.random()*0.01+0.01
  };
}

function launchConfetti(x, y, count = 100) {
  for (let i = 0; i < count; i++) {
    particles.push(createParticle(x ?? canvas.width/2, y ?? canvas.height/3));
  }
  if (!animating) { animating = true; animateConfetti(); }
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.vx *= 0.99; p.rot += p.rotV; p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI/180);
    if (p.shape === 'rect') ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
    else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  if (particles.length > 0) requestAnimationFrame(animateConfetti);
  else animating = false;
}

// ── Interaction Logic ──
document.getElementById('celebrateBtn').addEventListener('click', (e) => {
  const rect = e.target.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  launchConfetti(cx, cy, 150);
  
  const ring = document.createElement('div');
  ring.className = 'ring';
  ring.style.cssText = `left:${cx-30}px;top:${cy-30}px;position:fixed;z-index:999`;
  document.body.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());
});

document.querySelectorAll('.balloon').forEach(b => {
  b.addEventListener('click', e => {
    const r = e.target.getBoundingClientRect();
    launchConfetti(r.left + r.width/2, r.top, 50);
    b.style.transform = 'scale(0) rotate(20deg)';
    setTimeout(() => { b.style.transform = ''; }, 1500);
  });
});

setTimeout(() => launchConfetti(innerWidth/2, innerHeight/4, 80), 1000);
</script>
</body>
</html>
